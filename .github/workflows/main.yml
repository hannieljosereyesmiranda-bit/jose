name: APK Limpio

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Registrar el codigo
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias del sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y libportaudio2 git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev sqlite3 bzip2 libbz2-dev

    - name: Instalar Cython y Buildozer
      run: |
        pip install --upgrade pip
        pip install Cython==0.29.33 buildozer

    - name: Compilar APK con Buildozer
      run: |
        cd smartstore_kivy
        sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
        buildozer -v android debug

    - name: Subir el archivo APK terminado
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: smartstore_kivy/bin/*.apk
